	{

function expandPerson(personID)
	{
	document.getElementById('personSection' + personID).style.display="block";
	document.getElementById('plusSign' + personID).style.display="None";	
	document.getElementById('minusSign' + personID).style.display="block";		
	}

	{
	document.getElementById('personSection' + personID).style.display="none";
	document.getElementById('plusSign' + personID).style.display="block";	
	document.getElementById('minusSign' + personID).style.display="none";		
	}

function removalToggle(personID)
	{
	eleNamne = 	'removeBox' + personID;

			}
	}
